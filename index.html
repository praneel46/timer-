<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>⏱ Focus Timer</h2>

  <!-- Circular Timer -->
  <div class="circle">
    <svg width="220" height="220">
      <circle cx="110" cy="110" r="100" class="bg"></circle>
      <circle cx="110" cy="110" r="100" class="progress" id="progressCircle"></circle>
    </svg>
    <div class="time" id="timer">00:00</div>
  </div>

  <div class="buttons">
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>
  </div>
</div>

<!-- LOUD buzzer -->
<audio id="buzzer" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.wav"></audio>

<script src="script.js"></script>

</body>
</html>
